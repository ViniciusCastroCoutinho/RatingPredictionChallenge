repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
        -   id: trailing-whitespace
        -   id: end-of-file-fixer
        -   id: check-yaml

-   repo: https://github.com/hhatto/autopep8
    rev: v2.3.2
    hooks:
        -   id: autopep8

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
        # Run the linter.
        -   id: ruff-check
        # Run the formatter.
        -   id: ruff-format
